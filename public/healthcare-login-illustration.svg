<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Healthcare operations dashboard illustration</title>
  <desc id="desc">Stylized healthcare scene with doctors, chart panel, and heart pulse</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8faff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="1040" cy="140" r="80" fill="#c4b5fd" opacity="0.45"/>
  <circle cx="160" cy="760" r="96" fill="#93c5fd" opacity="0.35"/>

  <rect x="170" y="120" width="860" height="640" rx="28" fill="url(#panel)" stroke="#dbeafe" stroke-width="3"/>
  <rect x="210" y="170" width="330" height="220" rx="20" fill="#eef2ff"/>
  <rect x="565" y="170" width="425" height="130" rx="20" fill="#f1f5ff"/>
  <rect x="565" y="325" width="425" height="240" rx="20" fill="#f8faff"/>

  <rect x="240" y="205" width="110" height="24" rx="12" fill="#a78bfa"/>
  <rect x="240" y="242" width="220" height="16" rx="8" fill="#c7d2fe"/>
  <rect x="240" y="272" width="180" height="16" rx="8" fill="#dbeafe"/>
  <rect x="240" y="312" width="190" height="16" rx="8" fill="#c7d2fe"/>

  <path d="M610 236 H700 L736 208 L774 260 L806 228 L848 252 H948" fill="none" stroke="#7c3aed" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="610" y="355" width="160" height="20" rx="10" fill="#c7d2fe"/>
  <rect x="610" y="390" width="220" height="14" rx="7" fill="#dbeafe"/>
